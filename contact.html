<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .form-group { margin-bottom: 15px; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; }
    </style>
</head>
<body>

    <!-- Navigasi (Pautan Utama dipastikan ke index.html) -->
    <header>
        <a href="index.html" class="logo" style="text-decoration: none;">🐾 MeowLicious</a>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="adopt.html">Shop</a></li>
                <li><a href="contact.html" class="active">Contact Us</a></li>
                <li><a href="about us.html">About Us</a></li>
            </ul>
        </nav>
        <a href="adopt.html" class="btn-primary">Shop Now</a>
    </header>

    <div style="max-width: 600px; margin: 60px auto; padding: 30px; background: white; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05);">
        <h2 style="margin-bottom: 20px; text-align: center; color: #d97443;">Talk with MeowMates</h2>
        <form action="https://formspree.io/f/maqryyok" method="POST">
    <div class="form-group">
        <input type="text" name="name" placeholder="Your Name" required>
    </div>
    <div class="form-group">
        <input type="email" name="email" placeholder="Email" required>
    </div>
    <div class="form-group">
        <select name="state" required>
             <option value="">-- Choose Your State --</option>
                    <option value="Johor">Johor</option>
                    <option value="Kedah">Kedah</option>
                    <option value="Kelantan">Kelantan</option>
                    <option value="Melaka">Melaka</option>
                    <option value="Negeri Sembilan">Negeri Sembilan</option>
                    <option value="Pahang">Pahang</option>
                    <option value="Perak">Perak</option>
                    <option value="Perlis">Perlis</option>
                    <option value="Pulau Pinang">Penang</option>
                    <option value="Sabah">Sabah</option>
                    <option value="Sarawak">Sarawak</option>
                    <option value="Selangor">Selangor</option>
                    <option value="Terengganu">Terengganu</option>
                    <option value="Wilayah Persekutuan Kuala Lumpur">W.P. Kuala Lumpur</option>
                    <option value="Wilayah Persekutuan Labuan">W.P. Labuan</option>
                    <option value="Wilayah Persekutuan Putrajaya">W.P. Putrajaya</option>
        </select>
    </div>
    <div class="form-group">
        <textarea name="message" rows="5" placeholder="Your message or question..." required></textarea>
    </div>
    <button type="submit" class="btn-primary" style="border:none; width:100%; cursor:pointer;">
        Send your Meowssage
    </button>
</form>
<input type="hidden" name="_redirect" value="https://meowlicious.com/thankyou.html">
    </div>

</body>
</html>
