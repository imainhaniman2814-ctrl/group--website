<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <title>Cart</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .qty-btn {
      padding: 5px 10px;
      margin: 0 5px;
      cursor: pointer;
      background: #eee;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    .btn-primary {
      padding: 8px 15px;
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 5px;
      text-decoration: none;
      cursor: pointer;
    }
    .btn-primary:hover {
      background: #574bff;
    }
  </style>
</head>
<body>
  <header>
    <a href="index.html" class="logo" style="text-decoration: none;">🐾 MeowLicious</a>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="adopt.html">Shop</a></li>
        <li><a href="contact.html">Contact Us</a></li>
        <li><a href="about us.html">About Us</a></li>
        <li><a href="cart.html" class="active">Cart</a></li>
      </ul>
    </nav>
  </header>

  <div style="padding:50px 10%;">
    <h2 style="text-align:center;">Your Cart 🐾</h2>
    <table border="1" style="width:100%; text-align:center;">
      <thead>
        <tr>
          <th>Product</th>
          <th>Price (RM)</th>
          <th>Quantity</th>
          <th>Total (RM)</th>
        </tr>
      </thead>
      <tbody id="cartItems"></tbody>
    </table>
    <h3 id="grandTotal" style="text-align:right; margin-top:20px;"></h3>
    <button id="clearCart" class="btn-primary">Clear Cart</button>
    <a href="checkout.html" class="btn-primary" style="margin-left:10px;">Checkout</a>
  </div>

  <script>
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    let cartList = document.getElementById('cartItems');
    let grandTotal = 0;

    function renderCart(){
      cartList.innerHTML = "";
      grandTotal = 0;

      if(cart.length === 0){
        cartList.innerHTML = "<tr><td colspan='4'>No items in cart.</td></tr>";
      } else {
        cart.forEach((item, index) => {
          let total = item.price * item.quantity;
          grandTotal += total;
          let row = document.createElement('tr');
          row.innerHTML = `
            <td>${item.name}</td>
            <td>${item.price.toFixed(2)}</td>
            <td>
              <button class="qty-btn" onclick="updateQty(${index}, -1)">-</button>
              ${item.quantity}
              <button class="qty-btn" onclick="updateQty(${index}, 1)">+</button>
            </td>
            <td>${total.toFixed(2)}</td>
          `;
          cartList.appendChild(row);
        });
      }
      document.getElementById('grandTotal').innerText = "Grand Total: RM " + grandTotal.toFixed(2);
      localStorage.setItem("cart", JSON.stringify(cart));
    }

    function updateQty(index, change){
      cart[index].quantity += change;
      if(cart[index].quantity <= 0){
        cart.splice(index, 1); // remove item kalau quantity 0
      }
      renderCart();
    }

    document.getElementById('clearCart').onclick = function(){
      localStorage.removeItem("cart");
      cart = [];
      renderCart();
    };

    renderCart();
  </script>
</body>
</html>

</head>

    <style>
        /* Memastikan skrin scroll dengan lancar */
        html {
            scroll-behavior: smooth;
        }

        /* --- STYLE BUTTON BACK TO TOP PASTEL --- */
        #btnBackToTop {
            display: none;            /* Sorok pada permulaan */
            position: fixed;          /* Sentiasa terapung di skrin */
            bottom: 30px;             /* Jarak dari bawah */
            right: 30px;              /* Jarak dari kanan */
            z-index: 99;              /* Berada di lapisan paling atas */
            
            /* Sizing & Shape */
            width: 50px;              /* Lebar button seragam */
            height: 50px;             /* Tinggi button seragam */
            border-radius: 50%;       /* Jadikan bentuk bulat sempurna */
            border: none;             /* Buang border hitam standard */
            
            /* GUNA SALAH SATU WARNA PASTEL DI BAWAH: */
            background-color: #FFD1DC; /* 1. Pastel Pink (Latar Belakang) */
            /* background-color: #E8F0E6; */ /* 2. Pastel Sage Green (Buka ulasan jika nak guna) */
            /* background-color: #E6E6FA; */ /* 3. Pastel Lavender (Buka ulasan jika nak guna) */
            
            cursor: pointer;          
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.08); /* Bayang yang sangat soft */
            
            /* Center-kan ikon SVG di dalam button */
            display: flex;
            align-items: center;
            justify-content: center;
            
            transition: all 0.3s ease; /* Efek transition yang smooth */
        }

        /* Efek hover (bila mouse lalu atas button) */
        #btnBackToTop:hover {
            transform: translateY(-5px); /* Button akan naik sikit ke atas */
            box-shadow: 0px 6px 20px rgba(0, 0, 0, 0.12); /* Bayang jadi tebal sikit */
            background-color: #FCAEBB; /* Warna pink pekat sikit masa hover */
        }

        /* --- BAHAGIAN INI DIUBAH UNTUK BESARKAN ARROW --- */
        #btnBackToTop svg {
            stroke: #7DAAA5; /* Warna hijau/turquoise pastel */
            width: 30px;     /* Diubah dari 24px ke 30px */
            height: 30px;    /* Diubah dari 24px ke 30px */
        }
    </style>
</head>
<body>

    <button onclick="topFunction()" id="btnBackToTop" title="Go to top">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="4">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 10.5 12 3m0 0 7.5 7.5M12 3v18" />
        </svg>
    </button>

    <script>
        let mybutton = document.getElementById("btnBackToTop");

        window.onscroll = function() { scrollFunction() };

        function scrollFunction() {
            if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) {
                mybutton.style.display = "flex"; /* Guna 'flex' supaya ikon kekal di tengah */
            } else {
                mybutton.style.display = "none";
            }
        }

        function topFunction() {
            document.body.scrollTop = 0;
            document.documentElement.scrollTop = 0;
        }
    </script>

</body>
</html>
